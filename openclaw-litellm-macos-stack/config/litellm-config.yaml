# Generated by scripts/render-litellm-config.py from .env
# Active OpenAI key env vars: OPENAI_API_KEY, OPENAI_API_KEY_2
# LiteLLM will load-balance across repeated gpt-5.1-codex deployments.
model_list:
  - model_name: gpt-5.1-codex
    litellm_params:
      model: openai/gpt-5.1-codex
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gpt-5.1-codex
    litellm_params:
      model: openai/gpt-5.1-codex
      api_key: os.environ/OPENAI_API_KEY_2

  - model_name: MiniMax-M2.5
    litellm_params:
      model: minimax/MiniMax-M2.5
      api_key: os.environ/MINIMAX_API_KEY
      api_base: os.environ/MINIMAX_API_BASE

  - model_name: MiniMax-M2.1
    litellm_params:
      model: minimax/MiniMax-M2.1
      api_key: os.environ/MINIMAX_API_KEY
      api_base: os.environ/MINIMAX_API_BASE

general_settings:
  # Store auth + spend in Postgres; set keys via container env.
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL

router_settings:
  routing_strategy: simple-shuffle
  num_retries: 3
  retry_policy:
    AuthenticationErrorRetries: 3
    RateLimitErrorRetries: 3
    TimeoutErrorRetries: 3
    InternalServerErrorRetries: 3

litellm_settings:
  drop_params: true
  set_verbose: false
  json_logs: true
