# Generated by scripts/render-litellm-config.py from .env
# No non-empty provider keys found yet; keeping placeholder deployments so initial boot stays compatible.
model_list:
  - model_name: claude-opus-4-6
    litellm_params:
      model: anthropic/claude-opus-4-6
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: gpt-5.4
    litellm_params:
      model: openai/gpt-5.4
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gpt-5.1-codex
    litellm_params:
      model: openai/gpt-5.1-codex
      api_key: os.environ/OPENAI_API_KEY

general_settings:
  # Store auth + spend in Postgres; set keys via container env.
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL

router_settings:
  routing_strategy: simple-shuffle
  num_retries: 3
  retry_policy:
    AuthenticationErrorRetries: 3
    RateLimitErrorRetries: 3
    TimeoutErrorRetries: 3
    InternalServerErrorRetries: 3

litellm_settings:
  drop_params: true
  set_verbose: false
  json_logs: true
